name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run syntax checks
        run: npm run check

      - name: Healthz smoke test
        run: |
          node src/server.js &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          sleep 2
          curl -fsS http://127.0.0.1:3770/healthz
