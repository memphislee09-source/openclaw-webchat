<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>openclaw-webchat</title>
    <script>
      (() => {
        const nextThemeChoice = (stored) => {
          if (stored === 'dark') return 'dark';
          if (stored === 'light-paper') return 'light-paper';
          if (stored === 'light-gray') return 'light-gray';
          if (stored === 'light-linen') return 'light-linen';
          if (stored === 'light-mist') return 'light-mist';
          if (stored === 'light-sand') return 'light-sand';
          if (stored === 'light') return 'light-paper';
          return 'dark';
        };

        try {
          const key = 'openclaw-webchat-theme-choice';
          const legacyKey = 'openclaw-webchat-theme-mode';
          const stored = localStorage.getItem(key) || localStorage.getItem(legacyKey);
          const next = nextThemeChoice(stored);
          document.documentElement.dataset.theme = next;
          document.documentElement.style.colorScheme = next === 'dark' ? 'dark' : 'light';
        } catch {
          document.documentElement.dataset.theme = 'dark';
          document.documentElement.style.colorScheme = 'dark';
        }
      })();
    </script>
    <link rel="stylesheet" href="/static/styles.css?v=20260317-theme3" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div>
            <div class="eyebrow">OpenClaw</div>
            <h1>WebChat</h1>
          </div>
          <button class="icon-button mobile-only" id="closeSidebarButton" aria-label="关闭侧栏">✕</button>
        </div>

        <div class="sidebar-search-row">
          <button class="icon-button desktop-hidden" id="refreshAgentsButton" aria-label="刷新">↻</button>
        </div>

        <div class="agent-list" id="agentList"></div>

        <button class="settings-entry" id="settingsButton" type="button">
          <span>⚙️</span>
          <span>打开设置</span>
        </button>
      </aside>

      <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
      <div class="settings-backdrop" id="settingsBackdrop"></div>

      <main class="chat-layout">
        <header class="chat-header">
          <div class="chat-header-left">
            <button class="icon-button mobile-only" id="openSidebarButton" aria-label="打开侧栏">☰</button>
            <div>
              <div class="chat-title-row">
                <h2 id="chatTitle">openclaw-webchat</h2>
                <span class="presence-dot idle" id="headerPresence"></span>
              </div>
              <div class="chat-subtitle" id="chatSubtitle">选择 agent 开始聊天</div>
            </div>
          </div>
          <div class="chat-header-actions">
            <button class="ghost-button" id="headerRefreshButton" type="button">刷新</button>
          </div>
        </header>

        <section class="chat-panel">
          <div class="chat-status" id="chatStatus"></div>
          <div class="message-list" id="messageList"></div>

          <div class="composer-wrap">
            <form class="composer" id="composerForm">
              <div class="composer-main">
                <div class="pending-uploads" id="pendingUploads" hidden></div>
                <textarea
                  id="composerInput"
                  placeholder="输入消息，Enter 换行；点 / 按钮或直接输入 slash 命令可执行本地命令"
                  rows="1"
                ></textarea>
              </div>
              <div class="composer-actions">
                <input
                  id="mediaUploadInput"
                  type="file"
                  accept="image/*,audio/*,.m4a,.mp3,.wav,.aac,.ogg,.opus,.flac,.webm"
                  multiple
                  hidden
                />
                <button class="icon-button attach-button" type="button" id="attachButton" aria-label="上传图片或音频" title="上传图片或音频">+</button>
                <div class="command-picker">
                  <button class="ghost-button command-trigger" type="button" id="newContextButton" aria-label="打开 slash 命令菜单" aria-haspopup="menu" aria-expanded="false">/</button>
                  <div class="command-menu hidden" id="commandMenu"></div>
                </div>
                <button class="primary-button" type="submit" id="sendButton">发送</button>
              </div>
            </form>
          </div>
        </section>
      </main>

      <aside class="settings-panel" id="settingsPanel" aria-hidden="true">
        <div class="settings-panel-header">
          <div>
            <div class="eyebrow">Workspace Settings</div>
            <h3>设置</h3>
          </div>
          <button class="icon-button" id="closeSettingsButton" type="button" aria-label="关闭设置">✕</button>
        </div>

        <div class="settings-panel-body">
          <div class="settings-accordion">
            <section class="settings-accordion-item">
              <button class="settings-accordion-button" id="settingsContactsTab" type="button" data-settings-tab="contacts" aria-expanded="false">
                <span>联系人</span>
                <span class="settings-accordion-chevron">⌄</span>
              </button>

              <div class="settings-accordion-panel" id="settingsContactsSection" data-settings-panel="contacts" hidden>
                <div class="settings-section">
                  <div class="settings-section-title">联系人</div>
                  <p class="settings-section-copy">统一管理用户自己和所有 agent 的显示名称与头像。头像选择本地图片后会自动裁成正方形，点击保存后才生效。</p>

                  <div class="settings-card">
                    <div class="settings-preview-row">
                      <div class="settings-avatar-preview" id="settingsAvatarPreview"></div>
                      <div class="settings-preview-copy">
                        <div class="settings-preview-label" id="settingsPreviewTitle">联系人预览</div>
                        <div class="settings-preview-subtitle" id="settingsPreviewSubtitle">左栏、顶部标题和消息头像会同步更新</div>
                      </div>
                    </div>

                    <label class="settings-field">
                      <span>联系人</span>
                      <select id="settingsContactSelect"></select>
                    </label>

                    <label class="settings-field">
                      <span>显示名称</span>
                      <input id="settingsDisplayNameInput" type="text" maxlength="60" placeholder="输入显示名称" />
                    </label>

                    <div class="settings-field">
                      <span>头像</span>
                      <input id="settingsAvatarFileInput" type="file" accept="image/*" hidden />
                      <div class="settings-avatar-actions">
                        <button class="ghost-button" id="settingsChooseAvatarButton" type="button">选择本地图片</button>
                        <button class="ghost-button" id="settingsClearAvatarButton" type="button">清除头像</button>
                      </div>
                      <div class="settings-field-hint" id="settingsAvatarHint">支持本地图片，保存时自动裁成正方形并上传。</div>
                    </div>

                    <div class="settings-actions">
                      <button class="primary-button" id="saveSettingsButton" type="button">保存联系人设置</button>
                    </div>
                  </div>
                </div>
              </div>
            </section>

            <section class="settings-accordion-item">
              <button class="settings-accordion-button" id="settingsPreferencesTab" type="button" data-settings-tab="preferences" aria-expanded="false">
                <span>偏好</span>
                <span class="settings-accordion-chevron">⌄</span>
              </button>

              <div class="settings-accordion-panel" id="settingsPreferencesSection" data-settings-panel="preferences" hidden>
                <div class="settings-section">
                  <div class="settings-section-title">偏好</div>
                  <p class="settings-section-copy">这里开始承载工作区级偏好设置。主题模式已经可用，后续可以继续接入语种、消息密度等偏好项。</p>

                  <div class="settings-card">
                    <div class="settings-field">
                      <span>界面主题</span>
                      <div class="theme-preset-grid" id="settingsThemePresetButtons" role="group" aria-label="界面主题选择">
                        <button class="theme-preset-card" id="settingsThemeDarkButton" type="button" data-theme-choice="dark" aria-pressed="false">
                          <span class="theme-preset-header">
                            <span class="theme-preset-name">深色</span>
                            <span class="theme-preset-tag">默认</span>
                          </span>
                          <span class="theme-preset-preview theme-preview-dark" aria-hidden="true">
                            <span class="theme-preview-sidebar"></span>
                            <span class="theme-preview-panel"></span>
                            <span class="theme-preview-bubble"></span>
                          </span>
                          <span class="theme-preset-copy">夜间更稳，更适合低光环境。</span>
                        </button>

                        <button class="theme-preset-card" id="settingsThemePaperButton" type="button" data-theme-choice="light-paper" aria-pressed="false">
                          <span class="theme-preset-header">
                            <span class="theme-preset-name">Dawn Peach</span>
                            <span class="theme-preset-tag">A</span>
                          </span>
                          <span class="theme-preset-preview theme-preview-paper" aria-hidden="true">
                            <span class="theme-preview-sidebar"></span>
                            <span class="theme-preview-panel"></span>
                            <span class="theme-preview-bubble"></span>
                          </span>
                          <span class="theme-preset-copy">顶部有一点杏桃暖光，保留轻微色彩变化。</span>
                        </button>

                        <button class="theme-preset-card" id="settingsThemeGrayButton" type="button" data-theme-choice="light-gray" aria-pressed="false">
                          <span class="theme-preset-header">
                            <span class="theme-preset-name">Soft Gray</span>
                            <span class="theme-preset-tag">E</span>
                          </span>
                          <span class="theme-preset-preview theme-preview-gray" aria-hidden="true">
                            <span class="theme-preview-sidebar"></span>
                            <span class="theme-preview-panel"></span>
                            <span class="theme-preview-bubble"></span>
                          </span>
                          <span class="theme-preset-copy">中性浅灰，更安静，几乎不带额外色偏。</span>
                        </button>

                        <button class="theme-preset-card" id="settingsThemeLinenButton" type="button" data-theme-choice="light-linen" aria-pressed="false">
                          <span class="theme-preset-header">
                            <span class="theme-preset-name">Warm Linen</span>
                            <span class="theme-preset-tag">B</span>
                          </span>
                          <span class="theme-preset-preview theme-preview-linen" aria-hidden="true">
                            <span class="theme-preview-sidebar"></span>
                            <span class="theme-preview-panel"></span>
                            <span class="theme-preview-bubble"></span>
                          </span>
                          <span class="theme-preset-copy">微暖的亚麻纸感，柔和但不显脏。</span>
                        </button>

                        <button class="theme-preset-card" id="settingsThemeMistButton" type="button" data-theme-choice="light-mist" aria-pressed="false">
                          <span class="theme-preset-header">
                            <span class="theme-preset-name">Mist Blue</span>
                            <span class="theme-preset-tag">C</span>
                          </span>
                          <span class="theme-preset-preview theme-preview-mist" aria-hidden="true">
                            <span class="theme-preview-sidebar"></span>
                            <span class="theme-preview-panel"></span>
                            <span class="theme-preview-bubble"></span>
                          </span>
                          <span class="theme-preset-copy">偏冷静的蓝灰，工具感更强。</span>
                        </button>

                        <button class="theme-preset-card" id="settingsThemeSandButton" type="button" data-theme-choice="light-sand" aria-pressed="false">
                          <span class="theme-preset-header">
                            <span class="theme-preset-name">Soft Sand</span>
                            <span class="theme-preset-tag">D</span>
                          </span>
                          <span class="theme-preset-preview theme-preview-sand" aria-hidden="true">
                            <span class="theme-preview-sidebar"></span>
                            <span class="theme-preview-panel"></span>
                            <span class="theme-preview-bubble"></span>
                          </span>
                          <span class="theme-preset-copy">最放松的浅暖中性，存在感很轻。</span>
                        </button>
                      </div>
                      <div class="settings-field-hint" id="settingsThemeHint">主题偏好会保存在当前浏览器。</div>
                    </div>

                    <label class="settings-field">
                      <span>界面语种</span>
                      <select disabled>
                        <option>简体中文（即将开放）</option>
                      </select>
                    </label>

                    <div class="settings-field-hint">设置面板已按展开式分区组织，后续继续加项目时不需要再重做结构。</div>
                  </div>
                </div>
              </div>
            </section>
          </div>
        </div>
      </aside>

      <div class="media-viewer" id="mediaViewer" hidden aria-hidden="true">
        <div class="media-viewer-toolbar">
          <button class="icon-button media-viewer-button" id="mediaZoomOutButton" type="button" aria-label="缩小">－</button>
          <button class="icon-button media-viewer-button" id="mediaResetZoomButton" type="button" aria-label="重置缩放">1:1</button>
          <button class="icon-button media-viewer-button" id="mediaZoomInButton" type="button" aria-label="放大">＋</button>
        </div>
        <img class="media-viewer-image" id="mediaViewerImage" alt="图片预览" />
      </div>
    </div>

    <template id="messageTextTemplate">
      <div class="message-text"></div>
    </template>

    <script type="module" src="/static/app.js?v=20260317-theme3"></script>
  </body>
</html>
